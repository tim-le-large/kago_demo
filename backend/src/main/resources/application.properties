spring.application.name=backend
server.port=${PORT:8080}

# TRIAS endpoint (full URL including path). Override with env TRIAS_ENDPOINT.
trias.endpoint=${TRIAS_ENDPOINT:https://projekte.kvv-efa.de/lelargetrias/trias}
# RequestorRef from KVV — set TRIAS_REQUESTOR_REF in the environment for real calls.
trias.requestor-ref=${TRIAS_REQUESTOR_REF:changeme}

# REST client timeouts
trias.connect-timeout=10s
trias.read-timeout=30s

# Debugging: write masked TRIAS requests to /tmp/trias-*-request.xml
trias.dump-requests=${TRIAS_DUMP_REQUESTS:false}
